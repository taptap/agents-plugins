name: feedback
version: "1.0"
description: 处理 Slack #taptap-feedback 频道用户反馈，分析问题、判断 Bug、协助响应

input:
  one_of:
    slack_url:
      type: string
      description: Slack 消息链接
    slack_channel:
      type: string
      description: Slack 频道 ID（获取最新消息）

output:
  structured:
    is_bug:
      type: boolean
      description: 是否判定为 Bug
    business_line:
      type: string
      description: 归属业务线
    priority:
      type: string
      description: 建议优先级

dependencies:
  scripts:
    - feedback/scripts/feishu_api.py    # 需 aiohttp，见 feedback/requirements.txt
  mcp_servers:
    - slack
  env_vars:
    # feedback/scripts/feishu_api.py 创建/更新飞书 Bug 时必需
    - FEISHU_PLUGIN_ID
    - FEISHU_PLUGIN_SECRET
    - FEISHU_USER_KEY
