name: requirement-review
version: "1.1"
description: >
  在需求评审会前，对需求文档做质量把关。输入飞书 Story 链接或需求文档链接，
  通过 12 维度评审框架（单 Agent 强推理：假设/反例/结论 + 原文引用），
  输出 Go-No-Go 评审结论、结构化 Checklist 和各职能待确认问题清单。

input:
  one_of:
    story_link:
      type: string
      description: 飞书 Story 链接或需求文档链接（/story/detail/ 或 /wiki/ 或 /docx/）
  optional:
    design_link:
      type: string
      description: Figma 设计稿链接（提供时触发文档-设计稿交叉比对）

output:
  files:
    - name: requirement_understanding.md
      description: 需求理解结构化文档（目标、功能点、业务规则、依赖）
      format: markdown
    - name: review_checklist.md
      description: 12 维度评审清单（含每项状态标记和发现的问题）
      format: markdown
    - name: report.md
      description: 评审报告（7 章结构，含就绪度判定和按职能分组问题列表），发布到飞书 Wiki
      format: markdown
    - name: rr_summary.json
      description: 结构化窄摘要（verdict / issue_count / blocking_issues），供 ai-case requirement_review workflow 的 post_complete 与 extract_story_output 消费。schema 在 contracts/rr-summary.schema.json
      format: json

dependencies:
  scripts:
    - test-shared-tools/scripts/fetch_feishu_doc.py
    - test-shared-tools/scripts/gitlab_helper.py  # 条件触发
  env_vars:
    - FEISHU_APP_ID
    - FEISHU_APP_SECRET
    - GITLAB_URL      # 条件触发
    - GITLAB_TOKEN    # 条件触发
