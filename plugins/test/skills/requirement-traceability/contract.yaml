name: requirement-traceability
version: "2.0"
description: >
  双向追溯需求与代码变更的映射关系。输入需求描述 + 代码变更（MR/PR 或本地 diff），
  输出 traceability_matrix.json + coverage_report.json + risk_assessment.json。

input:
  one_of:
    code_changes:
      type: string[]
      description: 关联的 MR/PR 链接列表（GitLab MR 或 GitHub PR）
    code_diff:
      type: file
      description: 本地 diff 文件（git diff 输出、patch 文件等）
    code_diff_text:
      type: string
      description: 直接提供的代码变更文本（粘贴的 diff 内容）
  optional:
    story_link:
      type: string
      description: 需求链接（飞书 Story / 文档链接，或其他可通过脚本获取的 URL）
    requirement_doc:
      type: file
      description: 本地需求文档（AI 对话生成或手动提供的 .md / .json 文件）
    clarified_requirements:
      type: file
      description: 上游需求澄清结果
      from_upstream: requirement-clarification
    requirement_points:
      type: file
      description: 上游功能点清单
      from_upstream: requirement-clarification
    verification_cases:
      type: file
      description: 上游验证用例（verification-test-gen 产出）
      from_upstream: verification-test-gen
    design_link:
      type: string
      description: Figma 设计稿链接（UI 还原度检查时使用）
    ui_fidelity_report:
      type: file
      description: 上游 UI 还原度检查报告
      from_upstream: ui-fidelity-check

output:
  files:
    - name: traceability_matrix.json
      description: 需求×代码双向映射矩阵
      format: json
    - name: coverage_report.json
      description: 覆盖率统计和缺口清单
      format: json
    - name: risk_assessment.json
      description: 风险评估和行动建议
      format: json
    - name: forward_verification.json
      description: 正向用例中介验证结果
      format: json
    - name: ui_fidelity_report.json
      description: UI 还原度检查报告（条件产出，仅有设计稿时）
      format: json
  structured:
    overall_risk:
      type: string
      description: 总体风险等级
    requirement_coverage_rate:
      type: string
      description: 需求覆盖率
    code_traceability_rate:
      type: string
      description: 代码变更需求归属率
    gap_count:
      type: number
      description: 覆盖缺口数
    mode:
      type: string
      description: 执行模式（full | degraded），降级模式无需求源
    tracing_mode:
      type: string
      description: 追溯模式（single-pass | redundancy-pair）
    bidirectional_confirmation_rate:
      type: string
      description: 双向确认率（两个追溯 Agent 一致的映射占比）
    verification_channel:
      type: string
      description: 验证通道模式（dual_channel | forward_only | reverse_only）
    forward_verification_rate:
      type: string
      description: 正向用例验证通过率
    ui_fidelity_overall:
      type: string
      description: UI 还原度评级（high | medium | low | N/A）
    loop_iterations:
      type: number
      description: 回溯自循环执行轮次（0 表示无缺口未触发循环）
    loop_exit_reason:
      type: string
      description: 自循环退出原因（all_covered | max_iterations | no_progress | user_terminated | not_triggered）

dependencies:
  scripts:
    - shared-tools/scripts/fetch_feishu_doc.py
    - shared-tools/scripts/gitlab_helper.py
    - shared-tools/scripts/github_helper.py
    - shared-tools/scripts/search_mrs.py
    - shared-tools/scripts/search_prs.py
  env_vars:
    - FEISHU_APP_ID
    - FEISHU_APP_SECRET
    - GITLAB_URL
    - GITLAB_TOKEN
    - GITLAB_PROJECT_MAPPING
    - GITHUB_TOKEN
    - GITHUB_REPO_MAPPING
