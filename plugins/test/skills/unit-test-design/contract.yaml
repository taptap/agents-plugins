name: unit-test-design
version: "1.0"
description: >
  分析源代码文件，自动生成可执行的单元测试代码。
  输入源码文件/模块路径，输出对应语言的测试文件。

input:
  one_of:
    source_files:
      type: file[]
      description: 待生成测试的源代码文件列表
    source_dir:
      type: string
      description: 待生成测试的模块/目录路径
  optional:
    requirement_doc:
      type: file
      description: 需求文档或技术方案，辅助理解业务逻辑
    requirement_points:
      type: file
      description: 上游功能点清单，用于指导测试覆盖重点（优先为 P0/P1 功能点对应的代码模块生成单测）
      from_upstream: requirement-clarification
    final_cases:
      type: file
      description: 上游功能测试用例（评审后最终版），用于对齐测试场景和方法论
      from_upstream: test-case-generation
    test_framework:
      type: string
      description: 指定测试框架（如 pytest、vitest），默认自动检测
    skip_existing:
      type: boolean
      description: 是否跳过已有测试的函数（默认 true）
    xctestplan:
      type: file
      description: Xcode 测试计划文件（.xctestplan），用于了解测试分组策略（仅 iOS/macOS 项目）
    test_target:
      type: string
      description: Xcode 测试 target 名称，用于确定 @testable import 的模块名（仅 iOS/macOS 项目）

output:
  files:
    - name: test_plan.md
      description: 测试点清单（每个函数的测试用例设计）
      format: markdown
    - name: unit_test_execution_report.json
      description: 单元测试执行结果（verify 阶段执行测试后产出，环境不支持时不生成；v0.0.10 起从 test_execution_report.json 改名以避免与 integration-test-design 撞名）
      format: json
      optional: true
  structured:
    total_functions:
      type: number
      description: 分析的函数总数
    total_test_cases:
      type: number
      description: 生成的测试用例总数
    files_generated:
      type: number
      description: 生成的测试文件数
    language:
      type: string
      description: 检测到的编程语言
    quality_audit:
      type: object
      description: 断言审计结果（参见 CONVENTIONS.md 断言审计协议）
      properties:
        audit_mode:
          type: string
          description: "independent-audit（独立 agent 审计）或 self-audit（降级自审）"
        total_methods:
          type: number
          description: 审计的测试方法总数
        zero_assertion_methods:
          type: number
          description: 零断言方法数（审计前应为 0）
        weak_assertion_methods:
          type: number
          description: 仅含弱断言的方法数
        crash_safety_methods:
          type: number
          description: 显式标注为 [crashSafety] 的方法数
        all_passed:
          type: boolean
          description: 审计是否全部通过（无 BLOCKED 且无未处理的 WEAK）

dependencies:
  scripts: []
  env_vars: []
